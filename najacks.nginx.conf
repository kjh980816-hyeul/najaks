server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/najacks;
    index index.html;

    client_max_body_size 25M;

    # Vue SPA: try static, fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the SPA shell — keeps users on the latest hashed asset bundle
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires off;
    }

    # API proxy to Spring Boot
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # OAuth2 endpoints (Spring Security default paths)
    location /oauth2/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Spring custom OAuth (chzzk) + email unsubscribe
    location /oauth/chzzk/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /email/unsubscribe/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache built assets aggressively (hashed filenames)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # User-uploaded files (when running without S3)
    location /uploads/ {
        alias /var/lib/najacks/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }
}
