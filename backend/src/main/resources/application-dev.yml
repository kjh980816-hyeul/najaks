spring:
  datasource:
    url: jdbc:mysql://localhost:3306/najacks_dev?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

server:
  port: 8080

jwt:
  secret: dev-secret-key-for-local-development-only-not-for-production-use-minimum-256-bits

logging:
  level:
    com.najacks.backend: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
